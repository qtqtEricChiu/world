<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作品展示 - mocabolka.world</title>

    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/qtqtEricChiu/blog/refs/heads/main/resources/images/base/favicon.ico">

    <!-- 共用样式 -->
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">

    <!-- 背景预初始化 -->
    <script src="../../js/bg-init.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/qtqtEricChiu/world@main/js/pangu.js"></script>

    <style>
        /* ---- works/3 专用样式 ---- */
        .bg-overlay { background: rgba(5, 5, 5, 0.75); }

        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            z-index: 10;
            padding: 0;
            overflow: hidden;
        }

        .text-overlay-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            z-index: 20;
            padding: 70px 20px 0 20px;
            pointer-events: none;
        }

        /* 统一 works 标题样式 */
        .work-title {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 25px;
            color: #fff;
            text-shadow: 0 0 30px rgba(154, 200, 226, 0.5);
            line-height: 1.2;
            position: relative;
            padding-bottom: 15px;
        }
        .work-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 35%;
            width: 30%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-main), transparent);
        }

        .work-desc {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--accent-light);
            font-weight: 300;
            max-width: 800px;
            margin: 0 auto;
            opacity: 0.9;
        }

        .folder-view {
            display: flex;
            width: 100%;
            height: 50vh;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 52%;
            transform: translateY(-50%);
            z-index: 10;
        }

        .scroll-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-light);
            z-index: 50;
            transition: all 0.3s ease;
            border: none;
            outline: none;
        }

        .scroll-btn:hover {
            background: rgba(154, 200, 226, 0.2);
            color: #fff;
            transform: translateY(-50%) scale(1.1);
            border: 1px solid var(--accent-main);
        }

        .scroll-btn.left { left: 30px; }
        .scroll-btn.right { right: 30px; }

        .folder-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 0 10vw;
            gap: 40px;
            scroll-behavior: smooth;
        }

        .folder-container::-webkit-scrollbar { display: none; }

        .doc-slot {
            position: relative;
            flex: 0 0 clamp(300px, 35vw, 600px);
            scroll-snap-align: center;
            height: auto;
            cursor: none;
        }

        .doc-card {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.35, 1), box-shadow 0.4s ease;
            overflow: hidden;
            pointer-events: none;
        }

        .doc-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .doc-slot:hover .doc-card,
        .doc-slot.mobile-active .doc-card {
            transform: translateY(-25px);
            box-shadow: 0 25px 45px rgba(0,0,0,0.7);
            border-color: rgba(154, 200, 226, 0.8);
        }

        .doc-slot:hover .doc-card img,
        .doc-slot.mobile-active .doc-card img {
            opacity: 1;
            transform: scale(1.04);
        }

        .doc-label {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(-15px);
            width: 90%;
            text-align: center;
            color: #fff;
            font-size: 0.85rem;
            letter-spacing: 1px;
            background: rgba(10, 15, 20, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(154, 200, 226, 0.3);
            padding: 12px 10px;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 5;
            pointer-events: none;
        }

        .doc-slot:hover .doc-label,
        .doc-slot.mobile-active .doc-label {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .doc-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .doc-slot:hover .doc-card::after,
        .doc-slot.mobile-active .doc-card::after { opacity: 1; }

        @media (max-width: 768px) {
            .scroll-btn { display: none; }
            .bg-switcher { top: auto; bottom: calc(100px + var(--safe-bottom)); right: 12px; }
            .top-nav { top: calc(16px + var(--safe-top)); left: 12px; }
            .back-btn { font-size: 0.85rem; padding: 6px 14px; border-radius: 16px; }
            .back-btn svg { width: 16px; height: 16px; }
            .text-overlay-top { padding-top: 60px; position: relative; height: auto; }
            .work-title { font-size: 1.4rem; padding-bottom: 12px; }
            .work-title::after { left: 30%; width: 40%; }
            .work-desc { font-size: 0.8rem; padding: 0 10px; }
            .doc-slot { flex: 0 0 82vw; cursor: pointer; }
            .folder-view { top: 52%; height: 45vh; }
            .folder-container { padding: 0 6vw; gap: 24px; }
            .nav-button { transform: none !important; }
            .main-container { overflow-y: auto; -webkit-overflow-scrolling: touch; }
        }
    </style>
</head>
<body class="sub-page">

    <div id="initial-load-overlay"></div>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div class="bg-wrapper" id="mainBg"></div>
    <div class="bg-overlay"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="bg-switcher">
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(0)" style="background-image: url('https://s1.1ovv.com/2026/03/21/Ix6I.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(1)" style="background-image: url('https://s1.1ovv.com/2026/03/21/IxkP.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(2)" style="background-image: url('https://s1.1ovv.com/2026/03/21/I5rf.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(3)" style="background-image: url('https://s1.1ovv.com/2026/03/21/I5Wi.png')"></div>
    </div>

    <div class="top-nav">
        <a href="../../" class="back-btn page-link interactable">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>返回主页
        </a>
    </div>

    <div class="main-container">
        <div class="text-overlay-top">
            <h1 class="work-title">幻灯片设计制作 及 研究方向展示</h1>
            <p class="work-desc">与多学科学生开展合作，作为主要制作者完成课题及比赛用原创幻灯片设计</p>
        </div>

        <div class="folder-view">
            <button class="scroll-btn left interactable" id="scrollLeftBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>

            <div class="folder-container" id="folderContainer">
                <div class="doc-slot interactable">
                    <div class="doc-card">
                        <img src="https://s1.1ovv.com/2026/03/23/IAvg.png" alt="挑战杯-科技发明">
                        <div class="doc-label">挑战杯-科技发明</div>
                    </div>
                </div>
                <div class="doc-slot interactable">
                    <div class="doc-card">
                        <img src="https://s1.1ovv.com/2026/03/23/IA5A.png" alt="正大杯-地域产业">
                        <div class="doc-label">正大杯-地域产业</div>
                    </div>
                </div>
                <div class="doc-slot interactable">
                    <div class="doc-card">
                        <img src="https://s1.1ovv.com/2026/03/23/IAFq.png" alt="国创赛-古迹创新">
                        <div class="doc-label">国创赛-古迹创新</div>
                    </div>
                </div>
                <div class="doc-slot interactable">
                    <div class="doc-card">
                        <img src="https://s1.1ovv.com/2026/03/23/I6j1.png" alt="挑战杯-社会服务">
                        <div class="doc-label">挑战杯-社会服务</div>
                    </div>
                </div>
                <div class="doc-slot interactable">
                    <div class="doc-card">
                        <img src="https://s1.1ovv.com/2026/03/23/IANN.png" alt="CMAU-非遗创新">
                        <div class="doc-label">CMAU-非遗创新</div>
                    </div>
                </div>
            </div>

            <button class="scroll-btn right interactable" id="scrollRightBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>
    </div>

    <div class="bottom-button-row">
        <a href="../2/" class="nav-button interactable page-link">上一页</a>
        <a href="../4/" class="nav-button interactable next-button page-link">下一页</a>
    </div>

    <div class="copyright-footer">©Eric Chiu，网页使用AI辅助生成</div>

    <!-- 共用核心 JS -->
    <script src="../../js/core.js"></script>

    <!-- 页面专用 JS -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof pangu !== 'undefined') pangu.spacingPage();

            var container = document.getElementById('folderContainer');
            var slots = document.querySelectorAll('.doc-slot');

            document.getElementById('scrollLeftBtn').onclick = function() {
                container.scrollBy({ left: -400, behavior: 'smooth' });
            };
            document.getElementById('scrollRightBtn').onclick = function() {
                container.scrollBy({ left: 400, behavior: 'smooth' });
            };

            slots.forEach(function(slot) {
                slot.addEventListener('click', function() {
                    if (window.innerWidth <= 768) {
                        slots.forEach(function(s) { s.classList.remove('mobile-active'); });
                        slot.classList.add('mobile-active');
                    }
                });
            });

            if (slots.length > 0 && window.innerWidth <= 768) {
                slots[0].classList.add('mobile-active');
            }
        });

        /* 物理悬浮引擎 */
        var navButtons = document.querySelectorAll('.nav-button');
        var bdArray = Array.from(navButtons).map(function(b) {
            return { el: b, d: 15 + Math.random() * 10, cx: 0, cy: 0, tx: 0, ty: 0 };
        });
        var rx = 0, ry = 0;

        window.addEventListener('mousemove', function(e) {
            rx = (e.clientX / window.innerWidth - 0.5) * 2;
            ry = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        function renderPhysics() {
            if (window.innerWidth > 768) {
                bdArray.forEach(function(b) {
                    b.tx = -rx * b.d;
                    b.ty = -ry * b.d;
                    b.cx += (b.tx - b.cx) * 0.12;
                    b.cy += (b.ty - b.cy) * 0.12;
                    b.el.style.transform = 'translate(' + b.cx + 'px, ' + b.cy + 'px)';
                });
            }
            requestAnimationFrame(renderPhysics);
        }
        requestAnimationFrame(renderPhysics);
    </script>
</body>
</html>
