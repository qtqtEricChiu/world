<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 能力 - mocabolka.world</title>

    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/qtqtEricChiu/blog/refs/heads/main/resources/images/base/favicon.ico">
    <link rel="prefetch" href="../">

    <!-- 共用样式 -->
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">

    <!-- 背景预初始化 -->
    <script src="../js/bg-init.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/qtqtEricChiu/world@main/js/pangu.js"></script>

    <style>
        /* ================================================================
           AI 能力页面专用样式
           ================================================================ */

        html {
            overflow-x: hidden;
            overflow-y: auto;
        }
        body {
            overflow-x: hidden;
            overflow-y: visible;
            min-height: 100vh;
            position: relative;
        }

        /* ---- 自定义滚动条 ---- */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(154, 200, 226, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(154, 200, 226, 0.4); }
        ::-webkit-scrollbar-corner { background: transparent; }
        html { scrollbar-color: rgba(154, 200, 226, 0.2) transparent; scrollbar-width: thin; }

        /* ---- 主内容区 ---- */
        .main-stage {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            padding: 120px 48px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            transition: transform 0.25s ease-out;
            will-change: transform;
        }
        .main-stage > * { pointer-events: auto; }

        /* ================================================================
           PAGE HEADER
           ================================================================ */
        .page-header {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 48px;
        }
        .header-icon-block {
            position: relative;
            width: 80px; height: 80px;
            flex-shrink: 0;
        }
        .header-icon-block::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent-main), transparent, var(--accent-dark));
            opacity: 0.3;
            animation: iconGlow 3s ease-in-out infinite;
        }
        @keyframes iconGlow {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.45; transform: scale(1.04); }
        }
        .header-icon-inner {
            position: relative;
            width: 100%; height: 100%;
            background: rgba(20, 28, 42, 0.7);
            border: 1px solid rgba(154, 200, 226, 0.25);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .header-icon-inner svg {
            width: 42px; height: 42px;
            stroke: var(--accent-main);
            fill: none; stroke-width: 1.5;
        }
        .header-text-block { display: flex; flex-direction: column; }
        .header-overline {
            font-size: 0.7rem; letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-dark); font-weight: 600;
            margin-bottom: 6px;
        }
        .header-title {
            font-size: 3.2rem; font-weight: 200;
            letter-spacing: 8px; color: #fff;
            line-height: 1; margin-bottom: 8px;
        }
        .header-title .accent {
            font-weight: 500;
            background: linear-gradient(135deg, var(--accent-light), var(--accent-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ================================================================
           内容占位区
           ================================================================ */
        .content-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            width: 100%;
            max-width: 1400px;
            min-height: 400px;
            padding: 60px 40px;
            background: rgba(15, 20, 30, 0.35);
            border: 1px solid rgba(154, 200, 226, 0.1);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s forwards;
        }
        .placeholder-icon {
            width: 64px; height: 64px;
            border-radius: 20px;
            background: rgba(154, 200, 226, 0.06);
            border: 1px solid rgba(154, 200, 226, 0.15);
            display: flex; align-items: center; justify-content: center;
        }
        .placeholder-icon svg {
            width: 32px; height: 32px;
            stroke: var(--accent-dark);
            fill: none; stroke-width: 1.5;
        }
        .placeholder-text {
            font-size: 1.1rem;
            color: rgba(200, 215, 230, 0.45);
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
        }
        .placeholder-subtext {
            font-size: 0.82rem;
            color: rgba(200, 215, 230, 0.25);
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ================================================================
           响应式
           ================================================================ */
        @media (max-width: 768px) {
            .main-stage {
                padding: 90px 12px 80px;
            }
            .top-nav { top: calc(16px + var(--safe-top)); left: 12px; }
            .back-btn { font-size: 0.85rem; padding: 6px 14px; border-radius: 16px; }
            .back-btn svg { width: 16px; height: 16px; }
            .page-header {
                flex-direction: column; gap: 16px;
                text-align: center; margin-bottom: 28px;
            }
            .header-title { font-size: 2rem; letter-spacing: 4px; }
            .header-icon-block { width: 54px; height: 54px; }
            .header-icon-inner svg { width: 32px; height: 32px; }
            .content-placeholder { padding: 40px 20px; min-height: 280px; }
            .placeholder-text { font-size: 0.95rem; }
        }
    </style>
</head>
<body class="sub-page">

    <div id="initial-load-overlay"></div>

    <div id="cursor-ring"></div>

    <div class="bg-wrapper" id="mainBg"></div>
    <div class="bg-overlay"></div>

    <div class="bg-switcher">
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(0)" style="background-image:url('https://s1.1ovv.com/2026/03/21/Ix6I.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(1)" style="background-image:url('https://s1.1ovv.com/2026/03/21/IxkP.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(2)" style="background-image:url('https://s1.1ovv.com/2026/03/21/I5rf.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(3)" style="background-image:url('https://s1.1ovv.com/2026/03/21/I5Wi.png')"></div>
    </div>

    <div class="top-nav">
        <a href="../" class="back-btn page-link interactable">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            返回主页
        </a>
    </div>

<!-- ==================== 主内容区 ==================== -->
<div class="main-stage" id="mainStage">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="header-icon-block">
            <div class="header-icon-inner">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2 L15 8 L22 9 L17 14 L18 22 L12 18 L6 22 L7 14 L2 9 L9 8 Z"/>
                </svg>

        </div>
        <div class="header-text-block">
            <div class="header-overline">AI Capabilities</div>
            <h1 class="header-title">AI <span class="accent">能力</span></h1>

    </div>

    <!-- 内容占位区 -->
    <div class="content-placeholder">
        <div class="placeholder-icon">
            <svg viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 2 L12 6"/>
                <path d="M12 18 L12 22"/>
                <path d="M2 12 L6 12"/>
                <path d="M18 12 L22 12"/>
                <circle cx="12" cy="12" r="8" stroke-dasharray="2 3"/>
            </svg>
        </div>
        <div class="placeholder-text">内容准备中</div>
        <div class="placeholder-subtext">Content Coming Soon</div>
    </div>

</div><!-- /.main-stage -->

<div class="copyright-footer">©Eric Chiu，网页使用AI辅助生成</div>

<script src="../js/core.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof pangu !== 'undefined' && pangu.spacingPageElement) {
            pangu.spacingPageElement(document.body);
        }

        /* ================================================================
           main-stage 整体随光标/陀螺仪轻微晃动
           ================================================================ */
        const mainStage = document.getElementById('mainStage');
        let stageMoveTimeout;

        function applyStageMove(ratioX, ratioY) {
            if (!mainStage) return;
            const moveX = ratioX * 10;
            const moveY = ratioY * 10;
            mainStage.style.transform = 'translate(' + moveX + 'px, ' + moveY + 'px)';
            clearTimeout(stageMoveTimeout);
            stageMoveTimeout = setTimeout(function() {
                mainStage.style.transform = 'translate(0px, 0px)';
            }, 2000);
        }

        document.addEventListener('mousemove', function(e) {
            const ratioX = (e.clientX / window.innerWidth) - 0.5;
            const ratioY = (e.clientY / window.innerHeight) - 0.5;
            applyStageMove(ratioX, ratioY);
        });

        // 移动端陀螺仪替代
        if (mocabolka && mocabolka.isMobile) {
            function gyroStageLoop() {
                if (mocabolka.hasGyro) {
                    applyStageMove(mocabolka.gyroX, mocabolka.gyroY);
                }
                requestAnimationFrame(gyroStageLoop);
            }
            requestAnimationFrame(gyroStageLoop);
        }
    });
</script>

</body>
</html>
