<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文档阅览 - mocabolka.world</title>
    
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/qtqtEricChiu/blog/refs/heads/main/resources/images/base/favicon.ico">
    <link rel="prefetch" href="../">

    <style>
        @view-transition { navigation: auto; }
        ::view-transition-old(root) { animation: fade-out 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        ::view-transition-new(root) { animation: fade-in 0.4s cubic-bezier(0.4, 0, 0.2, 1); mix-blend-mode: normal; }
        @keyframes fade-out { to { opacity: 0; } }
        @keyframes fade-in { from { opacity: 0; } }
    </style>

    <script>
        (function() {
            const bgs = ['https://s1.1ovv.com/2026/03/21/Ix6I.png','https://s1.1ovv.com/2026/03/21/IxkP.png','https://s1.1ovv.com/2026/03/21/I5rf.png','https://s1.1ovv.com/2026/03/21/I5Wi.png'];
            const savedIndex = sessionStorage.getItem('bg-index') || 0;
            document.write(`<style>#mainBg{background-image:url('${bgs[savedIndex]}')}</style>`);
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/gh/qtqtEricChiu/world@main/js/pangu.js"></script>

    <style>
        :root { --accent-main: #9ac8e2; --accent-light: #cce5f4; --accent-dark: #7ab0d1; --glass-bg: rgba(10, 15, 20, 0.55); --glass-border: rgba(154, 200, 226, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { background-color: #000; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: "OPPO Sans 4.0", "OPPO Sans", sans-serif; color: #fff; cursor: none; }

        #initial-load-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 99999; pointer-events: none; animation: removeBlackScreen 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes removeBlackScreen { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* Custom Cursor */
        #cursor-dot, #cursor-ring { position: fixed; top: 0; left: 0; pointer-events: none; will-change: transform; opacity: 0; }
        #cursor-dot { width: 6px; height: 6px; background: var(--accent-main); border-radius: 50%; margin: -3px 0 0 -3px; z-index: 99998; }
        #cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(154, 200, 226, 0.5); border-radius: 50%; margin: -18px 0 0 -18px; z-index: 99997; }
        #cursor-dot.hovered { width: 10px; height: 10px; margin: -5px 0 0 -5px; box-shadow: 0 0 15px var(--accent-main); background: #fff; }
        #cursor-ring.hovered { width: 55px; height: 55px; margin: -27.5px 0 0 -27.5px; background-color: rgba(154, 200, 226, 0.1); border-color: transparent; }

        /* Background & Particles */
        .bg-wrapper { position: absolute; top: -2%; left: -2%; width: 104%; height: 104%; z-index: -2; background-size: cover; background-position: center; transition: background-image 0.8s ease-in-out; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: rgba(5, 5, 5, 0.5); }
        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* UI Elements */
        .bg-switcher { position: fixed; top: 30px; right: 40px; z-index: 100; display: flex; gap: 10px; padding: 8px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 12px; }
        .sw-btn { width: 30px; height: 30px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); cursor: none; background-size: cover; background-position: center; transition: transform 0.3s, border-color 0.3s; }
        .sw-btn:hover { transform: scale(1.1); border-color: var(--accent-main); }
        .sw-btn.active { border-color: var(--accent-main); box-shadow: 0 0 10px var(--accent-main); }

        .top-nav { position: fixed; top: 30px; left: 40px; z-index: 100; display: flex; align-items: center; }
        .back-btn { display: flex; align-items: center; gap: 10px; color: var(--accent-light); text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; padding: 8px 16px; border-radius: 20px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(154, 200, 226, 0.1); transition: all 0.3s ease; }
        .back-btn:hover { color: #fff; transform: translateX(-5px); border-color: var(--accent-main); background: rgba(154, 200, 226, 0.1); }

        /* Main Card */
        .card-wrapper { position: relative; width: 90vw; max-width: 1400px; height: 82vh; margin: 10vh auto 0; z-index: 10; opacity: 1; will-change: transform; }
        .blur-background { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; backdrop-filter: blur(25px) saturate(150%); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1); z-index: 1; }
        
        /* Modified Content Container for PDF */
        .content-container { position: relative; z-index: 2; width: 100%; height: 100%; padding: 40px 50px; display: flex; flex-direction: column; overflow: hidden; }
        
        .page-title { font-size: 2.2rem; font-weight: 300; letter-spacing: 4px; margin-bottom: 25px; text-align: center; color: #fff; text-shadow: 0 0 30px rgba(154, 200, 226, 0.5); position: relative; padding-bottom: 15px; flex-shrink: 0; }
        .page-title::after { content: ''; position: absolute; bottom: 0; left: 35%; width: 30%; height: 2px; background: linear-gradient(90deg, transparent, var(--accent-main), transparent); }
        
        /* PDF Viewer Styles */
        .pdf-viewer-box {
            flex-grow: 1;
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(154, 200, 226, 0.15);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
            /* Allow default cursor inside the iframe so users can select text/scroll */
            cursor: auto; 
        }

        .pdf-viewer-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .copyright-footer { position: fixed; bottom: 15px; left: 0; width: 100%; text-align: center; font-size: 0.8rem; color: rgba(255,255,255,0.3); letter-spacing: 1px; z-index: 50; }

        @media (max-width: 768px) {
            body, html { cursor: auto; } #cursor-dot, #cursor-ring { display: none; }
            .bg-switcher { top: auto; bottom: 50px; right: 20px; }
            .card-wrapper { width: 94vw; height: 85vh; margin-top: 8vh; }
            .content-container { padding: 25px 15px; }
            .page-title { font-size: 1.5rem; margin-bottom: 15px; padding-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div id="initial-load-overlay"></div>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div class="bg-wrapper" id="mainBg"></div>
    <div class="bg-overlay"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="bg-switcher">
        <div class="sw-btn interactable" onclick="changeBg(0)" style="background-image: url('https://s1.1ovv.com/2026/03/21/Ix6I.png')"></div>
        <div class="sw-btn interactable" onclick="changeBg(1)" style="background-image: url('https://s1.1ovv.com/2026/03/21/IxkP.png')"></div>
        <div class="sw-btn interactable" onclick="changeBg(2)" style="background-image: url('https://s1.1ovv.com/2026/03/21/I5rf.png')"></div>
        <div class="sw-btn interactable" onclick="changeBg(3)" style="background-image: url('https://s1.1ovv.com/2026/03/21/I5Wi.png')"></div>
    </div>

    <div class="top-nav">
        <a href="../" class="back-btn page-link interactable">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            返回主页
        </a>
    </div>

    <!-- 主体卡片容器 -->
    <div class="card-wrapper" id="parallaxCard">
        <div class="blur-background"></div>
        <div class="content-container">
            <!-- PDF 阅览器容器 -->
            <div class="pdf-viewer-box interactable" id="pdfContainer">
                <!-- ============================================== -->
                <!-- 在这里的 src 属性中填入你的 PDF 文件路径或链接 -->
                <!-- ============================================== -->
                <iframe src="/world/res/pdf/re.pdf" type="application/pdf">
                    <p>您的浏览器不支持直接在网页中阅读 PDF，请 <a href="/world/res/pdf/re.pdf" target="_blank" style="color: var(--accent-main);">点击此处下载阅读</a>。</p>
                </iframe>
            </div>

        </div>
    </div>

    <div class="copyright-footer">©Eric Chiu，网页使用AI辅助生成</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => { if (typeof pangu !== 'undefined') pangu.spacingPage(); });

        /* Bg Sync */
        const bgs = ['https://s1.1ovv.com/2026/03/21/Ix6I.png','https://s1.1ovv.com/2026/03/21/IxkP.png','https://s1.1ovv.com/2026/03/21/I5rf.png','https://s1.1ovv.com/2026/03/21/I5Wi.png'];
        const swBtns = document.querySelectorAll('.sw-btn');
        let savedIndex = parseInt(sessionStorage.getItem('bg-index')) || 0;
        function applyBg(index) { document.getElementById('mainBg').style.backgroundImage = `url('${bgs[index]}')`; sessionStorage.setItem('bg-index', index); swBtns.forEach((btn, i) => btn.classList.toggle('active', i == index)); }
        function changeBg(index) { applyBg(index); }
        applyBg(savedIndex);

        /* View Transition Navigation */
        document.querySelectorAll('.page-link').forEach(link => { link.addEventListener('click', () => { sessionStorage.setItem('cursor-x', mouseX); sessionStorage.setItem('cursor-y', mouseY); }); });

        /* Parallax Animation */
        const card = document.getElementById('parallaxCard');
        let cardTargetX = 0, cardTargetY = 0, cardCurrX = 0, cardCurrY = 0;
        window.addEventListener('mousemove', e => { cardTargetX = ((e.clientX / window.innerWidth - 0.5) * 2) * -8; cardTargetY = ((e.clientY / window.innerHeight - 0.5) * 2) * -8; });
        function renderCard() { cardCurrX += (cardTargetX - cardCurrX) * 0.1; cardCurrY += (cardTargetY - cardCurrY) * 0.1; card.style.transform = `translate(${cardCurrX}px, ${cardCurrY}px)`; requestAnimationFrame(renderCard); }
        requestAnimationFrame(renderCard);

        /* Cursor System */
        const cursorDot = document.getElementById('cursor-dot'), cursorRing = document.getElementById('cursor-ring');
        let mouseX = parseFloat(sessionStorage.getItem('cursor-x')) || window.innerWidth / 2, mouseY = parseFloat(sessionStorage.getItem('cursor-y')) || window.innerHeight / 2;
        let ringX = mouseX, ringY = mouseY, isCursorActive = false;
        
        // Handle cursor fading when over PDF iframe (browser iframe behavior takes over)
        const pdfContainer = document.getElementById('pdfContainer');
        pdfContainer.addEventListener('mouseenter', () => { cursorDot.style.opacity = '0'; cursorRing.style.opacity = '0'; });
        pdfContainer.addEventListener('mouseleave', () => { cursorDot.style.opacity = '1'; cursorRing.style.opacity = '1'; });

        function updateCursorPos(e) { if(!isCursorActive) { cursorDot.style.opacity = '1'; cursorRing.style.opacity = '1'; document.body.style.cursor = 'none'; isCursorActive = true; } mouseX = e.clientX; mouseY = e.clientY; cursorDot.style.transform = `translate(${mouseX}px, ${mouseY}px)`; }
        window.addEventListener('mousemove', updateCursorPos);
        window.addEventListener('touchstart', () => { isCursorActive = false; cursorDot.style.opacity = '0'; cursorRing.style.opacity = '0'; document.body.style.cursor = 'auto'; });
        function renderCursor() {
            if (isCursorActive || sessionStorage.getItem('cursor-x')) {
                if(!isCursorActive) { cursorDot.style.opacity='1'; cursorRing.style.opacity='1'; isCursorActive=true; }
                ringX += (mouseX - ringX) * 0.2; ringY += (mouseY - ringY) * 0.2;
                cursorRing.style.transform = `translate(${ringX}px, ${ringY}px)`; cursorDot.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
            } requestAnimationFrame(renderCursor);
        }
        renderCursor();
        document.querySelectorAll('.interactable').forEach(el => { 
            if(el.id !== 'pdfContainer') {
                el.addEventListener('mouseenter', () => { cursorDot.classList.add('hovered'); cursorRing.classList.add('hovered'); }); 
                el.addEventListener('mouseleave', () => { cursorDot.classList.remove('hovered'); cursorRing.classList.remove('hovered'); }); 
            }
        });

        /* Particles */
        const canvas = document.getElementById('particle-canvas'); const ctx = canvas.getContext('2d'); let particlesArray = [], activeMouse = { x: null, y: null };
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } window.addEventListener('resize', resize); resize(); window.addEventListener('mousemove', e => { activeMouse.x = e.clientX; activeMouse.y = e.clientY; });
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.size = Math.random() * 1.5 + 0.5; this.baseAlpha = Math.random() * 0.6 + 0.2; this.vx = (Math.random() - 0.5) * 1; this.vy = (Math.random() - 0.5) * 1; this.friction = 0.94; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(154, 200, 226, ${this.baseAlpha})`; ctx.fill(); }
            update() {
                let speed = Math.hypot(this.vx, this.vy);
                if (speed < 3 && activeMouse.x != null && activeMouse.y != null) { let dx = activeMouse.x - this.x, dy = activeMouse.y - this.y, distance = Math.hypot(dx, dy); if (distance < 350) { let force = (350 - distance) / 350; if (distance > 40) { this.vx += (dx / distance) * force * 0.5; this.vy += (dy / distance) * force * 0.5; } else { this.vx -= (dx / distance) * force * 0.8; this.vy -= (dy / distance) * force * 0.8; } this.vx += (-dy / distance) * force * 0.35; this.vy += (dx / distance) * force * 0.35; this.baseAlpha = Math.min(this.baseAlpha + 0.05, 1); } else { this.baseAlpha = Math.max(this.baseAlpha - 0.01, 0.2); } } else { this.baseAlpha = Math.max(this.baseAlpha - 0.01, 0.2); }
                this.vx *= this.friction; this.vy *= this.friction; this.x += this.vx; this.y += this.vy;
                if (this.x < 0) this.x = canvas.width; else if (this.x > canvas.width) this.x = 0; if (this.y < 0) this.y = canvas.height; else if (this.y > canvas.height) this.y = 0;
                this.draw();
            }
        }
        for (let i = 0; i < Math.min(Math.floor((canvas.width * canvas.height) / 6000), 350); i++) particlesArray.push(new Particle());
        function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particlesArray.forEach(p => p.update()); requestAnimationFrame(animate); } animate();
    </script>
</body>
</html>
