<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>个人简历 - mocabolka.world</title>

    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/qtqtEricChiu/blog/refs/heads/main/resources/images/base/favicon.ico">
    <link rel="prefetch" href="../">

    <!-- 共用样式 -->
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">

    <!-- 背景预初始化 -->
    <script src="../../js/bg-init.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/qtqtEricChiu/world@main/js/pangu.js"></script>

    <style>
        /* ---- resume 专用样式 ---- */
        .card-wrapper {
            max-width: 1400px;
        }

        .content-container {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* PDF Viewer */
        .pdf-viewer-box {
            flex-grow: 1;
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid rgba(154, 200, 226, 0.15);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
            cursor: auto;
        }

        .pdf-viewer-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* PDF 加载中占位提示 */
        .pdf-loading-placeholder {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: rgba(200, 215, 230, 0.5);
            font-size: 0.9rem;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 5;
        }
        .pdf-loading-spinner {
            width: 32px; height: 32px;
            border: 2px solid rgba(154, 200, 226, 0.15);
            border-top-color: var(--accent-main);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 飞书引导浮窗（与 works/1 的 modal 一致） */
        .feishu-guide-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -45%) scale(0.95);
            width: 90vw;
            max-width: 460px;
            background: rgba(10, 15, 20, 0.75);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            z-index: 55;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 24px 28px;
            text-align: center;
        }
        .feishu-guide-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }
        .feishu-guide-modal .modal-title {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 12px;
            font-weight: 500;
            letter-spacing: 2px;
        }
        .feishu-guide-modal .modal-desc {
            font-size: 0.9rem;
            color: var(--accent-light);
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 24px;
        }
        .feishu-guide-modal .modal-btn-group {
            display: flex;
            gap: 16px;
            width: 100%;
            justify-content: center;
        }
        .feishu-guide-modal .modal-btn {
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-family: inherit;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            backdrop-filter: blur(15px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .feishu-guide-modal .btn-cancel {
            background: rgba(154, 200, 226, 0.03);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .feishu-guide-modal .btn-cancel:hover {
            background: rgba(154, 200, 226, 0.1);
            border-color: var(--accent-main);
        }
        .feishu-guide-modal .btn-confirm {
            background: rgba(154, 200, 226, 0.15);
            color: var(--accent-main);
            border: 1px solid var(--accent-main);
        }
        .feishu-guide-modal .btn-confirm:hover {
            background: rgba(154, 200, 226, 0.25);
            box-shadow: 0 0 20px rgba(154, 200, 226, 0.5);
            color: #fff;
        }

        /* 弹窗打开时模糊底层 */
        .resume-blur-target {
            transition: filter 0.4s ease, opacity 0.4s ease;
        }
        .resume-blur-target.blurred {
            filter: blur(8px);
            opacity: 0.4;
            pointer-events: none !important;
        }

        @media (max-width: 768px) {
            .card-wrapper {
                width: 94vw;
                height: 82vh;
                margin-top: 7vh;
                border-radius: 16px;
            }
            .content-container {
                padding: 14px 10px;
            }
            .pdf-viewer-box {
                border-radius: 10px;
            }
            .top-nav {
                top: calc(14px + var(--safe-top));
                left: 10px;
            }
            .back-btn { font-size: 0.85rem; padding: 6px 14px; border-radius: 16px; }
            .back-btn svg { width: 16px; height: 16px; }
            .copyright-footer {
                bottom: calc(10px + var(--safe-bottom));
                font-size: 0.7rem;
            }
            .feishu-guide-modal {
                max-width: 88vw;
                padding: 28px 18px 24px;
            }
        }
    </style>
</head>
<body class="sub-page">

    <div id="initial-load-overlay"></div>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div class="bg-wrapper" id="mainBg"></div>
    <div class="bg-overlay"></div>
    <canvas id="particle-canvas"></canvas>

    <div class="bg-switcher">
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(0)" style="background-image: url('https://s1.1ovv.com/2026/03/21/Ix6I.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(1)" style="background-image: url('https://s1.1ovv.com/2026/03/21/IxkP.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(2)" style="background-image: url('https://s1.1ovv.com/2026/03/21/I5rf.png')"></div>
        <div class="sw-btn interactable" onclick="mocabolka.changeBg(3)" style="background-image: url('https://s1.1ovv.com/2026/03/21/I5Wi.png')"></div>
    </div>

    <div class="top-nav">
        <a href="../../" class="back-btn page-link interactable">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            返回主页
        </a>
    </div>

    <div class="card-wrapper resume-blur-target" id="parallaxCard">
        <div class="blur-background"></div>
        <div class="content-container">
            <div class="pdf-viewer-box interactable" id="pdfContainer">
                <!-- PDF 加载中占位 -->
                <div class="pdf-loading-placeholder" id="pdfLoadingPlaceholder">
                    <div class="pdf-loading-spinner"></div>
                    <span>简历加载中…</span>
                </div>
                <iframe id="pdfIframe" src="../../res/pdf/%E9%82%B1%E6%B7%BB%E7%AE%80%E5%8E%86-%E6%96%B0%E5%AA%92%E4%BD%93%E8%BF%90%E8%90%A5%E8%90%A5%E9%94%80%E7%94%A8%E5%B8%82%E7%A0%94%E5%8F%91%E8%A1%8C%E6%8A%95%E6%94%BE%E5%85%AC%E5%85%B3-27%E5%BA%94%E5%B1%8A-3-6%E6%9C%88.pdf" type="application/pdf">
                </iframe>
            </div>
        </div>
    </div>

    <!-- 飞书文档引导浮窗 -->
    <div class="feishu-guide-modal" id="feishuGuideModal">
        <h2 class="modal-title">温馨提示</h2>
        <p class="modal-desc">简历 PDF 加载可能需要一些时间。<br>您也可以前往【飞书文档】在线阅读完整版个人简历，体验更佳。</p>
        <div class="modal-btn-group">
            <button class="modal-btn btn-cancel interactable" id="cancelFeishuBtn">继续等待</button>
            <a href="https://my.feishu.cn/wiki/AJb2wzw5PiiD69kW6xxcIkbqnUc" target="_blank" class="modal-btn btn-confirm interactable" id="confirmFeishuBtn">前往飞书文档</a>
        </div>
    </div>

    <div class="copyright-footer resume-blur-target">©Eric Chiu，网页使用AI辅助生成</div>

    <!-- 共用核心 JS -->
    <script src="../../js/core.js"></script>

    <!-- 页面专用 JS -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof pangu !== 'undefined') pangu.spacingPage();
            initPdfDetection();
            initFeishuModal();
        });

        /* ================================================================
           PDF 加载检测 + 超时飞书引导
           移动端：内嵌 PDF 几乎必然无法渲染，3 秒后即弹出引导
           桌面端：10 秒超时兜底
           ================================================================ */
        var pdfTimeoutId = null;
        var pdfResolved = false;
        var guideShown = false;
        var loadingPlaceholder = document.getElementById('pdfLoadingPlaceholder');
        var feishuModal = document.getElementById('feishuGuideModal');
        var modalDesc = document.querySelector('.feishu-guide-modal .modal-desc');
        var blurTargets = document.querySelectorAll('.resume-blur-target');
        var isMobile = mocabolka.isMobile;

        // 移动端提示文案
        var MOBILE_DESC = '移动端浏览器可能无法直接在网页中显示 PDF 简历。<br>建议您前往【飞书文档】在线阅读完整版个人简历。';
        var DESKTOP_DESC = '简历 PDF 加载可能需要一些时间。<br>您也可以前往【飞书文档】在线阅读完整版个人简历，体验更佳。';

        function initPdfDetection() {
            var pdfIframe = document.getElementById('pdfIframe');
            if (!pdfIframe) return;

            // 策略1：监听 iframe load 事件 — PDF 加载完成（桌面端有效）
            pdfIframe.addEventListener('load', function() {
                if (!pdfResolved) {
                    resolvePdfLoading();
                }
            });

            // 策略2：超时检测
            // 移动端：3 秒（内嵌 PDF 几乎必然失败）
            // 桌面端：10 秒（给浏览器足够时间加载）
            var timeoutMs = isMobile ? 3000 : 10000;
            pdfTimeoutId = setTimeout(function() {
                if (!pdfResolved && !guideShown) {
                    // 移动端更新弹窗描述文案
                    if (isMobile && modalDesc) {
                        modalDesc.innerHTML = MOBILE_DESC;
                    }
                    showFeishuGuide();
                }
            }, timeoutMs);
        }

        function resolvePdfLoading() {
            pdfResolved = true;
            clearTimeout(pdfTimeoutId);
            if (loadingPlaceholder) {
                loadingPlaceholder.style.display = 'none';
            }
        }

        /* ================================================================
           飞书引导浮窗（与 works/1 的 LarkModal 一致）
           ================================================================ */
        function showFeishuGuide() {
            guideShown = true;
            if (feishuModal) {
                feishuModal.classList.add('active');
            }
            blurTargets.forEach(function(el) { el.classList.add('blurred'); });
        }

        function hideFeishuGuide() {
            if (feishuModal) {
                feishuModal.classList.remove('active');
            }
            blurTargets.forEach(function(el) { el.classList.remove('blurred'); });
        }

        function initFeishuModal() {
            var cancelBtn = document.getElementById('cancelFeishuBtn');
            var confirmBtn = document.getElementById('confirmFeishuBtn');

            if (cancelBtn) {
                cancelBtn.addEventListener('click', function() {
                    hideFeishuGuide();
                    // 用户选择继续等待，再给一次机会（移动端 8 秒，桌面端 15 秒）
                    pdfTimeoutId = setTimeout(function() {
                        if (!pdfResolved && !guideShown) {
                            if (isMobile && modalDesc) {
                                modalDesc.innerHTML = MOBILE_DESC;
                            }
                            showFeishuGuide();
                        }
                    }, isMobile ? 8000 : 15000);
                });
            }

            if (confirmBtn) {
                confirmBtn.addEventListener('click', function() {
                    hideFeishuGuide();
                });
            }
        }

        /* PDF iframe 光标处理 */
        var pdfContainer = document.getElementById('pdfContainer');
        pdfContainer.addEventListener('mouseenter', function() {
            if (mocabolka.cursorDot) mocabolka.cursorDot.style.opacity = '0';
            if (mocabolka.cursorRing) mocabolka.cursorRing.style.opacity = '0';
        });
        pdfContainer.addEventListener('mouseleave', function() {
            if (mocabolka.cursorDot) mocabolka.cursorDot.style.opacity = '1';
            if (mocabolka.cursorRing) mocabolka.cursorRing.style.opacity = '1';
        });

        /* Parallax Animation */
        var card = document.getElementById('parallaxCard');
        var cardTargetX = 0, cardTargetY = 0, cardCurrX = 0, cardCurrY = 0;
        window.addEventListener('mousemove', function(e) {
            cardTargetX = ((e.clientX / window.innerWidth - 0.5) * 2) * -8;
            cardTargetY = ((e.clientY / window.innerHeight - 0.5) * 2) * -8;
        });

        // 移动端陀螺仪
        if (mocabolka.isMobile) {
            function gyroLoop() {
                if (mocabolka.hasGyro) {
                    cardTargetX = mocabolka.gyroX * -8;
                    cardTargetY = mocabolka.gyroY * -8;
                }
                requestAnimationFrame(gyroLoop);
            }
            requestAnimationFrame(gyroLoop);
        }

        function renderCard() {
            cardCurrX += (cardTargetX - cardCurrX) * 0.1;
            cardCurrY += (cardTargetY - cardCurrY) * 0.1;
            card.style.transform = 'translate(' + cardCurrX + 'px, ' + cardCurrY + 'px)';
            requestAnimationFrame(renderCard);
        }
        requestAnimationFrame(renderCard);
    </script>
</body>
</html>
